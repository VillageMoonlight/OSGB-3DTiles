name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows
            artifact: osgb2tiles-windows-x64
            ext: .zip
          - os: ubuntu-22.04
            triplet: x64-linux
            artifact: osgb2tiles-linux-x64
            ext: .tar.gz
          - os: macos-14
            triplet: arm64-osx
            artifact: osgb2tiles-macos-arm64
            ext: .tar.gz

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache

    steps:
      - uses: actions/checkout@v4

      # 创建 vcpkg 二进制缓存目录
      - name: Create vcpkg cache dir
        shell: bash
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # 缓存 vcpkg 二进制包（加速后续构建）
      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-

      # 安装 vcpkg
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'c82f31667c6e4bd24b01d9e5e42abbca19e01344'

      # Linux 系统依赖（编译器 + 图形库）
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential g++ \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxt-dev libxmu-dev libxext-dev \
            pkg-config nasm autoconf automake libtool

      # macOS 系统依赖
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install nasm autoconf automake libtool pkg-config

      - name: CMake Configure
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: CMake Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: CMake Install
        shell: bash
        run: cmake --install build --prefix install --config Release

      # 打包 Windows
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "install/bin"
          $vcpkgBin = "build/vcpkg_installed/${{ matrix.triplet }}/bin"
          if (Test-Path $vcpkgBin) {
            Copy-Item "$vcpkgBin/*.dll" $binDir -Force -ErrorAction SilentlyContinue
          }
          Get-ChildItem "build/vcpkg_installed/${{ matrix.triplet }}/tools/osg" -Directory -Filter "osgPlugins*" -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName $binDir -Recurse -Force }
          $projDir = "build/vcpkg_installed/${{ matrix.triplet }}/share/proj"
          if (Test-Path $projDir) {
            Copy-Item $projDir "$binDir/proj" -Recurse -Force
          }
          if (Test-Path "osgb2tiles_gui.py") { Copy-Item "osgb2tiles_gui.py" $binDir -Force }
          Compress-Archive -Path "install/*" -DestinationPath "${{ matrix.artifact }}${{ matrix.ext }}"

      # 打包 Linux/macOS
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VCPKG_LIB="build/vcpkg_installed/${{ matrix.triplet }}/lib"
          if [ -d "$VCPKG_LIB" ]; then
            mkdir -p install/lib
            cp -f "$VCPKG_LIB"/*.so* install/lib/ 2>/dev/null || true
            cp -f "$VCPKG_LIB"/*.dylib* install/lib/ 2>/dev/null || true
          fi
          OSG_TOOLS="build/vcpkg_installed/${{ matrix.triplet }}/tools/osg"
          if [ -d "$OSG_TOOLS" ]; then
            cp -r "$OSG_TOOLS"/osgPlugins* install/bin/ 2>/dev/null || true
          fi
          PROJ_DATA="build/vcpkg_installed/${{ matrix.triplet }}/share/proj"
          if [ -d "$PROJ_DATA" ]; then
            cp -r "$PROJ_DATA" install/bin/proj
          fi
          tar czf "${{ matrix.artifact }}${{ matrix.ext }}" -C install .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
